<html>
    <head>
        <title>api - create </title>
    </head>
    <body>
        <script>

            // dados a serem enviados pela solicitação POST
            let data = {
              nome: "testeAlunoNome",
              curso: "testeCurso",
              email: "teste@teste.com.test",
              endereco: "ruaTestes, n 0",
              telefone: "(99)95555-5555"
            }

            fetch('http://127.0.0.1:8000/aluno/', {
            method: "POST",
            body: JSON.stringify(data),
            headers: {"Content-type": "application/json; charset=UTF-8"}
            })
            .then(response => response.json()) 
            .then(json => console.log(json))
            .catch(err => console.log(err));
        </script>
    </body>
</html>
