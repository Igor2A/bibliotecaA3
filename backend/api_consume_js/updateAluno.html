<html>
    <head>
        <title>api - update </title>
    </head>
    <body>
        <script>

            // dados a serem enviados pela solicitação POST
            let data = {
              nome: "testeTrocaAlunoNome",
              curso: "testeTrocaCurso",
              email: "teste@trocaTeste.com.test",
              endereco: "ruaTrocaTestes, n 0",
              telefone: "(55)59999-9999"
            }

            fetch('http://127.0.0.1:8000/alunos/2', {
            method: "PUT",
            body: JSON.stringify(data),
            headers: {"Content-type": "application/json; charset=UTF-8"}
            })
            .then(response => response.json()) 
            .then(json => console.log(json))
            .catch(err => console.log(err));
        </script>
    </body>
</html>
