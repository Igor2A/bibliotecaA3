<html>
    <head>
        <title>api - update </title>
    </head>
    <body>
        <script>

            // dados a serem enviados pela solicitação POST
            let data = {
                nome: "testTrocaNome",
                autor: "testTrocaAutor",
                editora: "testTrocaEditora",
                ano: 2026,
                edicao: 12,
                numero_pags: 200,
                categoria: "testTrocaCategoria",
                idioma: "Ingrês"
            }

            fetch('http://127.0.0.1:8000/livros/3', {
            method: "PUT",
            body: JSON.stringify(data),
            headers: {"Content-type": "application/json; charset=UTF-8"}
            })
            .then(response => response.json()) 
            .then(json => console.log(json))
            .catch(err => console.log(err));
        </script>
    </body>
</html>
