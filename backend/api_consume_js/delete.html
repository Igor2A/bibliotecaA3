<html>
    <head>
        <title>api - delete </title>
    </head>
    <body>
        <script>

            fetch('http://127.0.0.1:8000/users/17', {
            method: "DELETE",
            headers: {"Content-type": "application/json; charset=UTF-8"}
            })
            .then(response => response.json()) 
            .then(json => console.log(json))
            .catch(err => console.log(err));
        </script>
    </body>
</html>
